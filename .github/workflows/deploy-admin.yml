# 管理后台：仅当 aikefu-admin-web/ 有变更时部署
name: Deploy Admin (aikefu-admin-web)

on:
  push:
    branches: [main, master]
    paths:
      - 'aikefu-admin-web/**'
  workflow_dispatch:

concurrency:
  group: deploy-admin-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: aikefu-admin-web/package-lock.json

      - name: Install and build
        working-directory: aikefu-admin-web
        run: |
          npm ci
          npm run build

      - name: Install rsync & sshpass
        run: sudo apt-get update && sudo apt-get install -y rsync sshpass

      - name: Rsync dist to server
        env:
          SSHPASS: ${{ secrets.REMOTE_PASSWORD }}
        run: |
          sshpass -e rsync -avz --delete \
            -e "ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null" \
            aikefu-admin-web/dist/ \
            ${{ secrets.REMOTE_USER }}@${{ secrets.REMOTE_IP }}:/var/www/aikefu/admin/
