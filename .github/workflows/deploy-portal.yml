# 用户门户：仅当 aikefu-portal-web/ 有变更时部署
name: Deploy Portal (aikefu-portal-web)

on:
  push:
    branches: [main, master]
    paths:
      - 'aikefu-portal-web/**'
  workflow_dispatch:

concurrency:
  group: deploy-portal-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: aikefu-portal-web/package-lock.json

      - name: Install and build
        working-directory: aikefu-portal-web
        run: |
          npm ci
          npm run build

      - name: Install rsync & sshpass
        run: sudo apt-get update && sudo apt-get install -y rsync sshpass

      # dist/ 末尾斜杠：只同步目录内文件到目标根目录，不保留 dist 这一层
      - name: Rsync dist to server
        env:
          SSHPASS: ${{ secrets.REMOTE_PASSWORD }}
        run: |
          sshpass -e rsync -avz --delete \
            -e "ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null" \
            aikefu-portal-web/dist/ \
            ${{ secrets.REMOTE_USER }}@${{ secrets.REMOTE_IP }}:/var/www/aikefu/portal/
