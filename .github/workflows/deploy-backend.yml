# 后端 Spring Boot：仅当 aikefu_bot02/ 有变更时部署
name: Deploy Backend (aikefu_bot02)

on:
  push:
    branches: [main, master]
    paths:
      - 'aikefu_bot02/**'
  workflow_dispatch:

concurrency:
  group: deploy-backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Maven package
        working-directory: aikefu_bot02
        run: mvn -B -DskipTests package

      - name: Upload JAR to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.REMOTE_IP }}
          username: ${{ secrets.REMOTE_USER }}
          password: ${{ secrets.REMOTE_PASSWORD }}
          port: 22
          source: 'aikefu_bot02/target/aikefu_bot02-0.0.1-SNAPSHOT.jar'
          target: '/root/app'

      - name: Restart remote Java process
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.REMOTE_IP }}
          username: ${{ secrets.REMOTE_USER }}
          password: ${{ secrets.REMOTE_PASSWORD }}
          port: 22
          script_stop: true
          script: |
            set -e
            pkill -f 'aikefu_bot02-0.0.1-SNAPSHOT.jar' || true
            sleep 2
            cd /root/app
            nohup java -jar aikefu_bot02-0.0.1-SNAPSHOT.jar > app.log 2>&1 &
            echo "Backend restarted."
