# 后端 Spring Boot：仅当 aikefu_bot02/ 有变更时部署
name: Deploy Backend (aikefu_bot02)

on:
  push:
    branches: [main, master]
    paths:
      - 'aikefu_bot02/**'
  workflow_dispatch:

concurrency:
  group: deploy-backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Maven package
        working-directory: aikefu_bot02
        run: mvn -B -DskipTests package

      - name: Upload JAR to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.REMOTE_IP }}
          username: ${{ secrets.REMOTE_USER }}
          password: ${{ secrets.REMOTE_PASSWORD }}
          port: 22
          source: 'aikefu_bot02/target/aikefu_bot02-0.0.1-SNAPSHOT.jar'
          target: '/root/app'
          strip_components: 2

      - name: Restart remote Java process
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.REMOTE_IP }}
          username: ${{ secrets.REMOTE_USER }}
          password: ${{ secrets.REMOTE_PASSWORD }}
          port: 22
          script: |
            # 1. 强力清理旧进程（根据端口号杀，比根据名字杀更靠谱）
            fuser -k 8080/tcp || true 
            
            # 2. 进入目录
            cd /root/app/target  # 如果你没加 strip_components，文件会在这个死板路径下
            # 如果加了 strip_components，请用：cd /root/app
            
            # 3. 确保旧日志不会无限增长
            rm -f app.log 
            
            # 4. 启动并后台运行
            nohup java -jar aikefu_bot02-0.0.1-SNAPSHOT.jar > app.log 2>&1 &
            
            # 5. 给进程一点启动时间，并检查是否启动成功
            sleep 5
            if ps -ef | grep -v grep | grep aikefu_bot02; then
              echo "✅ Backend started successfully."
            else
              echo "❌ Backend failed to start, check app.log"
              exit 1
            fi
