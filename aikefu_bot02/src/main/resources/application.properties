spring.application.name=aikefu_bot02
# 可选：在 src/main/resources/application-local.properties 中覆盖密钥等（该文件已加入 .gitignore）
spring.config.import=optional:classpath:application-local.properties
# JWT 密钥（生产务必修改）
app.jwt.secret=aikefu-admin-jwt-secret-key-min-32-chars-long-for-hs256!!
# 本机 8080 常被占用时改用其它端口（Knife4j/Swagger 地址中的端口需与此一致）
server.port=8081

# MySQL（与 Navicat 库名 aikefu_bot 一致；账号密码与本地配置一致）
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/aikefu_bot?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Kou05286.
# 避免 MySQL 未就绪时连接失败导致 DataSource 未注册，进而 MybatisPlusAutoConfiguration 不生效（-1 表示延迟到首次取连接时再建连）
spring.datasource.hikari.initialization-fail-timeout=-1

# Flyway：启动时执行 classpath:db/migration 下 V*.sql；若库已有人工建表但无 flyway_schema_history，会打基线后再执行未应用的版本
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true

# MyBatis-Plus
mybatis-plus.mapper-locations=classpath*:/mapper/**/*.xml
mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.global-config.db-config.logic-delete-field=deleted
mybatis-plus.global-config.db-config.logic-not-delete-value=0
mybatis-plus.global-config.db-config.logic-delete-value=1

# 本地未启动 Redis 时：在 AikefuBot02Application 中排除 DataRedisAutoConfiguration（Spring Boot 4 包名已变更，勿写旧类名）

# OpenAPI（JSON）
springdoc.api-docs.path=/v3/api-docs
# 不在文档中暴露 Actuator
springdoc.show-actuator=false
# 原生 Swagger UI：SpringDoc 3 常用入口为 /swagger-ui/index.html（/swagger-ui.html 多为重定向）
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true

# 接口文档（端口与 server.port 一致）：
#   Swagger UI：http://localhost:{server.port}/swagger-ui/index.html
#   OpenAPI JSON：http://localhost:{server.port}/v3/api-docs

# Actuator
management.endpoints.web.exposure.include=health,info

# DeepSeek（OpenAI 兼容 Chat Completions，文档：https://api-docs.deepseek.com/zh-cn/ ）
# 密钥必须通过环境变量 DEEPSEEK_API_KEY 注入，或在本机创建 application-local.properties（已 .gitignore）设置 app.deepseek.api-key，切勿提交密钥。
app.deepseek.base-url=https://api.deepseek.com
app.deepseek.completions-path=/chat/completions
app.deepseek.model=deepseek-chat
app.deepseek.api-key=sk-97d5cd2b908445719de40451ca908d8f
# 以下为语气补充（业务身份、政策、知识库由 app.customer-service.* 注入）
app.deepseek.system-prompt=涉及金额、时效与规则时表述严谨；其余以门户「对话风格」配置为准。
# 客服场景：略高温度使表述更自然（可与门户提示词配合；可按效果微调 0.45～0.75）
app.deepseek.temperature=0.62
app.deepseek.max-history-messages=24
app.deepseek.timeout-seconds=120

# C 端智能客服业务画像（请按实际店铺/商品/政策修改，会注入大模型系统提示）
app.customer-service.brand-name=智服商城
# 多行可用 \\n 分隔，或写在 application-local.properties
app.customer-service.business-profile=主营数码配件与智能家居周边，提供订单查询、售后与使用咨询。发货：现货订单一般48小时内发出，预售以商品详情页为准。退换：支持7天无理由（商品完好），质量问题可联系客服。人工客服时间：工作日9:00-18:00。
app.customer-service.reply-policy=你必须以官方客服身份作答。须优先依据「知识库摘录」与「业务与政策说明」；若资料未提及或不确定，须明确说明并引导用户提供订单号或转人工，禁止编造价格、库存、活动与法律承诺。
app.customer-service.knowledge-retrieval-enabled=true
app.customer-service.knowledge-max-docs=5
app.customer-service.knowledge-snippet-max-chars=1200
app.customer-service.knowledge-fallback-latest=false
app.customer-service.knowledge-fallback-count=3

